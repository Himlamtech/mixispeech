name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare paper figure
        run: |
          base64 --decode assets/mixispeech-overview.b64 > assets/mixispeech-overview.jpg
          python - <<'PY'
          from pathlib import Path
          import re
          page = Path('index.html')
          html = page.read_text()
          html = re.sub(r'<svg class="method-svg".*?</svg>', '<img src="assets/mixispeech-overview.jpg" alt="MixiSpeech method overview" style="display:block;width:100%;margin:22px 0 4px;border:1px solid #edf1f3;border-radius:10px">', html, flags=re.S)
          page.write_text(html)
          PY
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
